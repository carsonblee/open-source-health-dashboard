# CI pipeline activated on push to the main branch.
# Performs two (2) jobs:
#   1. Linting
#   2. Testing

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # -------------- JOB 1: LINTING --------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 app.py tests/ --max-line-length=99

  # -------------- JOB 2: TESTING --------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test with pytest
      run: pytest tests/ -v
